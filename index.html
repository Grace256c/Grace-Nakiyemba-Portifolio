<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grace Nakiyemba | Portfolio</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container": "#eaedff",
              "on-background": "#131b2e",
              "tertiary-fixed-dim": "#fabc4e",
              "tertiary-container": "#9b6b00",
              "surface-variant": "#dae2fd",
              "error-container": "#ffdad6",
              "surface-tint": "#8B5CF6",
              "primary": "#8B5CF6",
              "tertiary": "#7b5500",
              "secondary-fixed-dim": "#ffb0cd",
              "surface-dim": "#d2d9f4",
              "on-surface": "#131b2e",
              "on-surface-variant": "#4d4354",
              "inverse-on-surface": "#eef0ff",
              "on-error": "#ffffff",
              "on-tertiary-container": "#fffbff",
              "outline": "#7e7385",
              "primary-fixed": "#ede9fe",
              "secondary": "#b4136d",
              "on-tertiary-fixed-variant": "#604100",
              "on-error-container": "#93000a",
              "outline-variant": "#cfc2d6",
              "on-tertiary-fixed": "#281900",
              "on-tertiary": "#ffffff",
              "on-secondary-fixed": "#3e0022",
              "surface-container-low": "#f2f3ff",
              "surface-container-high": "#e2e7ff",
              "surface": "#faf8ff",
              "secondary-fixed": "#ffd9e4",
              "on-primary": "#ffffff",
              "error": "#ba1a1a",
              "surface-container-highest": "#dae2fd",
              "surface-container-lowest": "#ffffff",
              "background": "#faf8ff",
              "on-secondary": "#ffffff",
              "inverse-primary": "#c4b5fd",
              "on-primary-fixed-variant": "#5b21b6",
              "primary-container": "#a78bfa",
              "on-secondary-container": "#600037",
              "on-primary-container": "#fffbff",
              "primary-fixed-dim": "#c4b5fd",
              "on-secondary-fixed-variant": "#8c0053",
              "surface-bright": "#faf8ff",
              "on-primary-fixed": "#2e1065",
              "tertiary-fixed": "#ffdead",
              "secondary-container": "#fd56a7",
              "inverse-surface": "#283044"
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px"
            },
            spacing: {
              "margin-mobile": "16px",
              "container-max": "1200px",
              "gutter": "24px",
              "unit": "8px",
              "margin-desktop": "48px"
            },
            fontFamily: {
              "code-sm": ["JetBrains Mono"],
              "body-md": ["Inter"],
              "headline-lg": ["Inter"],
              "display": ["Inter"],
              "label-md": ["JetBrains Mono"],
              "body-lg": ["Inter"],
              "headline-lg-mobile": ["Inter"]
            },
            fontSize: {
              "code-sm": ["13px", { lineHeight: "18px", fontWeight: "400" }],
              "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
              "headline-lg": ["32px", { lineHeight: "40px", letterSpacing: "-0.01em", fontWeight: "700" }],
              "display": ["64px", { lineHeight: "72px", letterSpacing: "-0.02em", fontWeight: "800" }],
              "label-md": ["14px", { lineHeight: "20px", letterSpacing: "0.05em", fontWeight: "500" }],
              "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
              "headline-lg-mobile": ["24px", { lineHeight: "32px", letterSpacing: "-0.01em", fontWeight: "700" }]
            },
            animation: {
              blink: "blink 1s step-end infinite",
              drift: "drift 60s linear infinite",
              "slide-in-left": "slideInLeft 0.8s ease-out forwards",
              "slide-in-right": "slideInRight 0.8s ease-out forwards"
            },
            keyframes: {
              blink: {
                "from, to": { "border-color": "transparent" },
                "50%": { "border-color": "currentColor" }
              },
              slideInLeft: {
                from: { opacity: "0", transform: "translateX(-40px)" },
                to: { opacity: "1", transform: "translateX(0)" }
              },
              slideInRight: {
                from: { opacity: "0", transform: "translateX(40px)" },
                to: { opacity: "1", transform: "translateX(0)" }
              },
              drift: {
                from: { "background-position": "0 0" },
                to: { "background-position": "100px 100px" }
              }
            }
          }
        }
      };
    </script>
  </head>
  <body class="bg-background dark:bg-slate-950 text-on-background font-body-md selection:bg-primary-fixed selection:text-on-primary-fixed overflow-x-hidden relative transition-colors">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
